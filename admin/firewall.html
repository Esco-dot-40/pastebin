<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SECURITY_CORE | NEXUS_CREATIVE_TECH</title>
    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=JetBrains+Mono:wght@500;800&family=Orbitron:wght@900&display=swap">
    <link rel="stylesheet" href="firewall.css">

    <!-- amCharts 5 -->
    <script src="https://cdn.amcharts.com/lib/5/index.js"></script>
    <script src="https://cdn.amcharts.com/lib/5/map.js"></script>
    <script src="https://cdn.amcharts.com/lib/5/geodata/worldLow.js"></script>
    <script src="https://cdn.amcharts.com/lib/5/themes/Animated.js"></script>
</head>

<body class="admin-theme">
    <div class="hologram-overlay"></div>

    <div class="dashboard-wrapper">
        <!-- Sidebar: Controls -->
        <aside class="sidebar-controls">
            <header class="sidebar-header">
                <div class="system-icon">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z" />
                    </svg>
                </div>
                <div class="title-stack">
                    <h1>SYSTEM_FIREWALL</h1>
                    <span class="sub-line">CORE_v4.5_ULTIMATE</span>
                </div>
            </header>

            <div class="status-box">
                <div class="status-indicator">
                    <span class="dot pulse"></span>
                    SYSTEM_OPERATIONAL
                </div>
                <div class="uptime-stat">UPTIME: <span id="uptime-val">99.998%</span></div>
            </div>

            <div class="panels-stack">
                <!-- Global Protocols -->
                <div class="hud-panel">
                    <div class="hud-header">GLOBAL_PROTOCOLS</div>
                    <div class="toggle-list">
                        <div class="toggle-item">
                            <div class="toggle-info">
                                <span class="t-name">LOCKDOWN_MODE</span>
                                <span class="t-desc">BLOCK ALL EXTERNAL</span>
                            </div>
                            <label class="switch">
                                <input type="checkbox" id="lockdown-toggle" onchange="updateLockdown()">
                                <span class="slider"></span>
                            </label>
                        </div>
                        <div class="toggle-item">
                            <div class="toggle-info">
                                <span class="t-name">EUROPE_BLOCK</span>
                                <span class="t-desc">50+ REGIONS</span>
                            </div>
                            <label class="switch">
                                <input type="checkbox" id="europe-block-toggle" onchange="updateLockdown()">
                                <span class="slider"></span>
                            </label>
                        </div>
                        <div class="toggle-item">
                            <div class="toggle-info">
                                <span class="t-name">USA_BLOCK</span>
                                <span class="t-desc">NORTH AMERICAN ARCH</span>
                            </div>
                            <label class="switch">
                                <input type="checkbox" id="usa-block-toggle" onchange="updateLockdown()">
                                <span class="slider"></span>
                            </label>
                        </div>
                    </div>
                </div>

                <!-- Admin Whitelist -->
                <div class="hud-panel">
                    <div class="hud-header">AUTHORIZED_IP_WHITELIST</div>
                    <div class="input-stack">
                        <input type="text" id="admin-ip-input" placeholder="IP_ADDRESS (CSV FORMAT)">
                        <button class="hud-btn" onclick="updateLockdown()">SYNC_PERMISSIONS</button>
                    </div>
                </div>

                <!-- Core Metrics -->
                <div class="hud-panel">
                    <div class="hud-header">CORE_METRICS</div>
                    <div class="metrics-row">
                        <div class="m-box">
                            <div class="m-val" id="stat-blocked-regions">--</div>
                            <div class="m-lbl">BLOCKED</div>
                        </div>
                        <div class="m-box">
                            <div class="m-val" id="stat-threats">--</div>
                            <div class="m-lbl">THREATS</div>
                        </div>
                    </div>
                </div>
            </div>
        </aside>

        <!-- Main Workspace: Globe -->
        <main class="globe-workspace">
            <div id="chartdiv"></div>
            <div class="globe-label">INTERACTIVE_GEOSPATIAL_FIREWALL</div>
        </main>

        <!-- Right: Granular Search -->
        <aside class="sidebar-search">
            <div class="hud-panel full-height">
                <div class="hud-header">GRANULAR_DATABASE</div>
                <div class="search-wrap">
                    <input type="text" id="country-search" placeholder="SEARCH_REGION..." oninput="filterCountries()">
                </div>
                <div id="country-grid" class="country-scroll-grid">
                    <!-- Dynamic Grid -->
                </div>
            </div>
        </aside>
    </div>

    <!-- Notification system -->
    <div id="notifications"></div>

    <script src="firewall.js"></script>
</body>

</html>
