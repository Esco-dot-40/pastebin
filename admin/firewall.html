<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global Firewall | veroe.space Admin</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap"
        rel="stylesheet">

    <!-- amCharts 5 -->
    <script src="https://cdn.amcharts.com/lib/5/index.js"></script>
    <script src="https://cdn.amcharts.com/lib/5/map.js"></script>
    <script src="https://cdn.amcharts.com/lib/5/geodata/worldLow.js"></script>
    <script src="https://cdn.amcharts.com/lib/5/themes/Animated.js"></script>

    <link rel="icon" type="image/png" href="/public/favicon.png">
    <style>
        .firewall-layout {
            display: grid;
            grid-template-columns: 350px 1fr;
            height: 100vh;
            overflow: hidden;
        }

        .fw-sidebar {
            background: rgba(10, 10, 15, 0.95);
            border-right: 1px solid var(--border);
            padding: 20px;
            display: flex;
            flex-direction: column;
            z-index: 10;
            height: 100vh;
            overflow: hidden;
        }

        .fw-main {
            position: relative;
            background: radial-gradient(circle at 50% 50%, #111 0%, #050505 100%);
            height: 100vh;
        }

        #chartdiv {
            width: 100%;
            height: 100%;
            min-height: 100vh;
        }

        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: var(--text-secondary);
            text-decoration: none;
            margin-bottom: 20px;
            font-weight: 600;
            font-size: 0.9rem;
            transition: color 0.2s;
        }

        .back-btn:hover {
            color: var(--text-primary);
        }

        .fw-stats {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 20px;
        }

        .fw-stat-box {
            background: rgba(255, 255, 255, 0.05);
            padding: 15px;
            border-radius: 12px;
            text-align: center;
            border: 1px solid var(--border);
        }

        .fw-list-container {
            flex: 1;
            overflow-y: auto;
            border-top: 1px solid var(--border);
            margin-top: 10px;
            padding-top: 10px;
        }

        .fw-country-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            cursor: pointer;
            transition: background 0.2s;
        }

        .fw-country-item:hover {
            background: rgba(255, 255, 255, 0.03);
        }

        .fw-country-item.blocked {
            color: #ff0055;
        }
    </style>
</head>

<body>
    <div class="firewall-layout">
        <aside class="fw-sidebar">
            <a href="/adminperm/" class="back-btn">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M19 12H5M12 19l-7-7 7-7" />
                </svg>
                Back to Dashboard
            </a>

            <h2 style="font-family: var(--font-heading); margin-bottom: 5px;">Firewall Control</h2>
            <p style="font-size: 0.8rem; color: var(--text-tertiary); margin-bottom: 20px;">Global Geo-Blocking Node</p>

            <div class="fw-stats">
                <div class="fw-stat-box">
                    <div id="fw-blocked-count" style="font-size: 1.5rem; font-weight: 700; color: #ff0055;">--</div>
                    <div style="font-size: 0.7rem; color: var(--text-tertiary);">BLOCKED REGIONS</div>
                </div>
                <div class="fw-stat-box">
                    <div id="fw-threats-count" style="font-size: 1.5rem; font-weight: 700; color: #ff0055;">--</div>
                    <div style="font-size: 0.7rem; color: var(--text-tertiary);">THREATS</div>
                </div>
            </div>

            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px;">
                <button id="toggleUSA" class="btn btn-glass" style="font-size: 0.7rem; padding: 10px;">Toggle
                    USA</button>
                <button id="toggleEurope" class="btn btn-glass" style="font-size: 0.7rem; padding: 10px;">Toggle
                    Europe</button>
            </div>

            <input type="text" id="firewallSearch" class="neon-input" placeholder="Search Country..."
                style="margin-bottom: 10px;">

            <div id="firewallList" class="fw-list-container">
                <!-- Populated by JS -->
            </div>
        </aside>

        <main class="fw-main">
            <div id="chartdiv"></div>

            <!-- Overlay Legend -->
            <div style="position: absolute; bottom: 30px; left: 30px; pointer-events: none;">
                <div class="heatmap-legend"
                    style="background: rgba(0,0,0,0.6); padding: 10px 20px; border-radius: 20px; backdrop-filter: blur(10px); pointer-events: auto;">
                    <span class="legend-item"><span class="dot" style="background: #ff0055;"></span> Blocked</span>
                    <span class="legend-item"><span class="dot pink"></span> High Traffic</span>
                    <span class="legend-item"><span class="dot blue"></span> Operational</span>
                </div>
            </div>
        </main>
    </div>

    <script src="../shared/api.js?v=10"></script>
    <script src="app.js?v=24"></script>
</body>

</html>
