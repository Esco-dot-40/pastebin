<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>veroe.space | Premium Admin</title>
    <link rel="stylesheet" href="style.css?v=8">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
</head>

<body>
    <div class="background-gradient"></div>

    <div class="container-fluid">
        <!-- Header -->
        <header class="header glass-card">
            <div class="logo">
                <div class="logo-text">
                    <h1>veroe.space <span class="accent">Admin</span></h1>
                    <div class="system-status">
                        <span class="status-dot"></span>
                        <span id="activeVisitors">0 Active Visitors</span>
                    </div>
                </div>
            </div>
            <div class="header-actions">
                <button id="accessBtn" class="btn btn-glass">Access Keys</button>
                <button id="usersBtn" class="btn btn-glass">Users</button>
                <button id="logoutBtn" class="btn btn-glass"
                    style="border-color: #ff006e; color: #ff006e;">Logout</button>
            </div>
        </header>

        <!-- Dashboard Stats -->
        <section class="dashboard-stats">
            <div class="stat-group">
                <div class="stat-box">
                    <span class="stat-label">Total Hits</span>
                    <span id="totalHits" class="stat-value">0</span>
                    <div class="stat-trend">Tracking Live</div>
                </div>
                <div class="stat-box">
                    <span class="stat-label">Unique Readers</span>
                    <span id="uniqueReaders" class="stat-value">0</span>
                </div>
                <div class="stat-box">
                    <span class="stat-label">Geo Reach</span>
                    <span id="geoReach" class="stat-value">0</span>
                </div>
                <div class="stat-box">
                    <span class="stat-label">Avg Session</span>
                    <span class="stat-value">4.2m</span>
                </div>
            </div>

            <!-- Heatmap Container -->
            <div class="heatmap-container glass-card">
                <div class="heatmap-header">
                    <h3>Visitor Distribution Heatmap</h3>
                    <div class="heatmap-legend">
                        <span class="legend-item"><span class="dot pink"></span> High Traffic</span>
                        <span class="legend-item"><span class="dot blue"></span> Recent Activity</span>
                    </div>
                </div>
                <div id="mainHeatmap" class="map-frame"></div>
            </div>
        </section>

        <!-- Main Content -->
        <main class="main-grid">
            <!-- Left: Paste List -->
            <section class="paste-list glass-card">
                <div class="section-header">
                    <h2>Recent Drops</h2>
                    <div class="header-tools">
                        <div class="search-box">
                            <input type="text" id="pasteSearch" placeholder="Filter ID/Title...">
                        </div>
                        <button id="refreshBtn" class="btn-mini-icon">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                stroke-width="2">
                                <path
                                    d="M23 4v6h-6M1 20v-6h6M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15">
                                </path>
                            </svg>
                        </button>
                    </div>
                </div>
                <div id="pasteListContainer" class="paste-items-v2">
                    <!-- Loaded via JS -->
                </div>
            </section>

            <!-- Right: Editor -->
            <section class="paste-editor glass-card">
                <div class="section-header">
                    <h2>Deploy Content</h2>
                    <button id="clearBtn" class="btn btn-glass">Clear</button>
                </div>
                <div class="editor-v2">
                    <div class="editor-main">
                        <div class="input-container">
                            <label>Title</label>
                            <input type="text" id="pasteTitle" placeholder="Untitled Paste" class="neon-input">
                        </div>
                        <div class="grid-2">
                            <div class="input-container">
                                <label>Language</label>
                                <select id="pasteLanguage" class="neon-select"></select>
                            </div>
                            <div class="input-container">
                                <label>Expiration</label>
                                <select id="pasteExpiration" class="neon-select">
                                    <option value="never">Permanent</option>
                                    <option value="10m">10 Minutes</option>
                                    <option value="1h">1 Hour</option>
                                    <option value="1d">1 Day</option>
                                </select>
                            </div>
                        </div>
                        <div class="input-container">
                            <label>Content</label>
                            <textarea id="pasteContent" placeholder="Paste data here..."
                                class="neon-textarea"></textarea>
                        </div>
                    </div>
                    <div class="editor-sidebar">
                        <div class="config-panel">
                            <h3>Security</h3>
                            <input type="password" id="pastePassword" placeholder="Password (Optional)"
                                class="neon-input" style="margin-bottom: 10px;">
                            <div class="toggle-list">
                                <label class="neon-toggle">
                                    <input type="checkbox" id="burnAfterRead">
                                    <span class="slider"></span>
                                    <span>Self-Destruct</span>
                                </label>
                                <label class="neon-toggle" style="margin-top: 10px;">
                                    <input type="checkbox" id="isPublic" checked>
                                    <span class="slider"></span>
                                    <span>Public</span>
                                </label>
                            </div>
                        </div>
                        <button id="createPasteBtn" class="btn btn-primary-neon">Deploy Payload</button>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <!-- Modals -->
    <div id="analyticsModal" class="modal">
        <div class="modal-content modal-large">
            <div id="analyticsContent"></div>
            <button onclick="document.getElementById('analyticsModal').classList.remove('active')" class="btn"
                style="margin-top: 20px;">Close</button>
        </div>
    </div>

    <div id="accessModal" class="modal">
        <div class="modal-content">
            <h3>Access Keys</h3>
            <div id="keyList"></div>
            <button onclick="document.getElementById('accessModal').classList.remove('active')" class="btn"
                style="margin-top: 20px;">Close</button>
        </div>
    </div>

    <script src="../shared/api.js?v=8"></script>
    <script src="app.js?v=8"></script>
</body>

</html>
